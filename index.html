<!DOCTYPE html>
<html lang="es-MX" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALTARA | Executive Therapy & Restauración Biomecánica</title>
    <meta name="description" content="Santuario clínico en Reforma 195.">
    
    <!-- Tipografías -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- RUTAS BLINDADAS (Anti-Caché V10.3) -->
    <link rel="stylesheet" href="css/main.css?v=10.3">
    <link rel="stylesheet" href="css/components.css?v=10.3">
</head>
<body>

    <!-- =========================================================
         1. PANTALLA DE BIENVENIDA INMERSIVA (ONBOARDING)
         Esta pantalla cubre todo hasta que el usuario pone su nombre
         ========================================================= -->
    <div id="onboarding-screen" class="full-screen-overlay" aria-hidden="false">
        <div class="onboarding-content">
            <i aria-hidden="true" class="fa-solid fa-leaf gold-icon" style="font-size: 4rem; margin-bottom: 2rem;"></i>
            <h1 style="font-family: var(--font-accent); font-size: 3rem; margin-bottom: 1rem;">Bienvenido a Valtara</h1>
            <p style="color: #bbb; font-size: 1.1rem; margin-bottom: 3rem; font-weight: 300;">Para personalizar su expediente clínico y su experiencia, por favor indíquenos cómo desea ser llamado.</p>
            
            <div class="input-group">
                <label for="welcome-name-input" class="sr-only">Su nombre o título</label>
                <input type="text" id="welcome-name-input" placeholder="Ej. Licenciado, Doctor, Ángel..." autocomplete="off">
                <button id="welcome-start-btn" class="btn-primary" style="margin-top: 1.5rem; width: 100%;">Ingresar al Santuario</button>
            </div>
            <button id="welcome-skip-btn" class="btn-text-only" style="margin-top: 2rem; color: #777; font-size: 0.9rem; text-decoration: underline;">Prefiero entrar como invitado</button>
        </div>
    </div>

    <!-- ANUNCIADOR DE ACCESIBILIDAD OCULTO -->
    <div aria-live="assertive" aria-atomic="true" class="sr-only" id="a11y-announcer"></div>

    <!-- FONDOS ANIMADOS -->
    <div aria-hidden="true" class="ambient-engine" id="ambient-bg">
        <div class="aurora-layer"></div>
    </div>

    <!-- =========================================================
         2. CABECERA MINIMALISTA
         ========================================================= -->
    <header class="system-header" role="banner">
        <button aria-label="Ir al inicio" class="header-logo" onclick="Router.navigate('home')">
            <i aria-hidden="true" class="fa-solid fa-leaf"></i> <span>VALTARA</span>
        </button>

        <div class="header-controls">
            <!-- Menú de Hamburguesa (Tres rayitas) -->
            <button aria-label="Abrir panel de control y menú" aria-expanded="false" aria-controls="main-nav" class="hamburger-btn" id="menu-toggle-btn">
                <i aria-hidden="true" class="fa-solid fa-bars"></i>
            </button>
        </div>
    </header>

    <!-- =========================================================
         3. MENÚ LATERAL EXPANDIBLE (PANEL DE CONTROL DEL PACIENTE)
         ========================================================= -->
    <nav aria-label="Navegación y Perfil" class="side-menu" id="main-nav" role="navigation">
        <div class="menu-header">
            <!-- Área de Perfil del Paciente dentro del Menú -->
            <div class="patient-profile-card">
                <div class="profile-avatar"><i class="fa-solid fa-user-tie"></i></div>
                <div class="profile-info">
                    <span class="profile-greeting" id="menu-greeting">Buenas tardes,</span>
                    <strong class="profile-name" id="menu-user-name">Paciente</strong>
                </div>
            </div>
            <button aria-label="Cerrar panel" class="close-btn" id="menu-close-btn">
                <i aria-hidden="true" class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <div class="menu-scroll-area">
            <h3 class="menu-section-title">Navegación Clínica</h3>
            <ul class="nav-list" role="menubar">
                <li role="none"><button role="menuitem" class="nav-item" data-target="home"><i class="fa-solid fa-house"></i> <span>Sede y Triaje</span></button></li>
                <li role="none"><button role="menuitem" class="nav-item" data-target="restoration"><i class="fa-solid fa-spa"></i> <span>Catálogo Clínico</span></button></li>
                <li role="none"><button role="menuitem" class="nav-item" data-target="codex"><i class="fa-solid fa-scroll"></i> <span>Manifiesto Codex</span></button></li>
                <li role="none"><button role="menuitem" class="nav-item" data-target="science"><i class="fa-solid fa-microscope"></i> <span>Ciencia y Botánica</span></button></li>
                <li role="none"><button role="menuitem" class="nav-item" data-target="ergonomics"><i class="fa-solid fa-wheelchair"></i> <span>Ergonomía Universal</span></button></li>
                <li role="none"><button role="menuitem" class="nav-item" data-target="legal"><i class="fa-solid fa-shield-halved"></i> <span>Marco Legal</span></button></li>
            </ul>

            <h3 class="menu-section-title" style="margin-top: 2rem;">Personalización</h3>
            <ul class="nav-list" role="menu">
                <li role="none"><button role="menuitem" class="nav-item btn-tool" id="btn-change-name"><i class="fa-solid fa-pen"></i> <span>Editar mi nombre</span></button></li>
                <li role="none"><button role="menuitem" class="nav-item btn-tool" id="btn-toggle-contrast"><i class="fa-solid fa-circle-half-stroke"></i> <span>Alto Contraste</span></button></li>
                <li role="none"><button role="menuitem" class="nav-item btn-tool" id="btn-toggle-dyslexia"><i class="fa-solid fa-font"></i> <span>Modo Dislexia</span></button></li>
            </ul>

            <a role="menuitem" href="https://wa.me/5213348572070" target="_blank" class="btn-ws-massive" style="margin-top: 2rem;">
                <i aria-hidden="true" class="fa-brands fa-whatsapp"></i> Contactar Concierge
            </a>
        </div>
    </nav>

    <!-- =========================================================
         4. MODALES REFINADOS (Aura IA y Audio)
         ========================================================= -->
    <!-- Modal para editar nombre (Si se llama desde el menú) -->
    <dialog aria-label="Actualizar Identidad" class="modal-dialog small-modal" id="edit-name-modal">
        <div class="modal-content">
            <header class="modal-header">
                <h3>Identidad Clínica</h3>
                <button aria-label="Cerrar" class="close-modal-btn" data-close="edit-name-modal"><i class="fa-solid fa-xmark"></i></button>
            </header>
            <div class="modal-body">
                <input type="text" id="edit-name-input" placeholder="Nuevo nombre...">
                <button id="save-edit-name-btn" class="btn-primary" style="width: 100%; margin-top: 1rem;">Guardar Cambios</button>
            </div>
        </div>
    </dialog>

    <dialog aria-label="Reproductor de Audio Oasis" class="modal-dialog" id="audio-modal"></dialog>

    <dialog aria-label="Inteligencia Artificial Aura" class="modal-dialog mega-modal" id="aura-modal">
        <div class="modal-content aura-container">
            <header class="modal-header">
                <h3><i class="fa-solid fa-sparkles"></i> Aura AI</h3>
                <button aria-label="Cerrar Aura" class="close-modal-btn" data-close="aura-modal"><i class="fa-solid fa-xmark"></i></button>
            </header>
            <div aria-live="polite" class="aura-chat-window" id="aura-chat"></div>
            <div class="aura-controls">
                <input type="text" id="aura-input" placeholder="Describa su tensión (Ej. Me duele la ciática)..." inputmode="text" enterkeyhint="send">
                <button aria-label="Enviar mensaje" id="aura-send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </dialog>

    <!-- BOTONES FLOTANTES -->
    <aside aria-label="Controles Rápidos Izquierdos" class="float-controls float-left">
        <button aria-label="Abrir terapias sonoras" aria-haspopup="dialog" class="fab-btn" id="fab-audio"><i class="fa-solid fa-music"></i></button>
    </aside>

    <aside aria-label="Controles Rápidos Derechos" class="float-controls float-right">
        <button aria-label="Abrir Inteligencia Artificial Aura" aria-haspopup="dialog" class="fab-btn fab-aura" id="fab-aura"><i class="fa-solid fa-robot"></i></button>
    </aside>

    <!-- CONTENEDOR PRINCIPAL -->
    <main id="main-content" role="main">
        <section class="view-section active" id="view-home"></section>
        <section class="view-section" id="view-restoration"></section>
        <section class="view-section" id="view-codex"></section>
        <section class="view-section" id="view-science"></section>
        <section class="view-section" id="view-ergonomics"></section>
        <section class="view-section" id="view-legal"></section>
    </main>

    <footer class="mega-footer" id="main-footer"></footer>

    <!-- SCRIPTS EN MINÚSCULAS CON VERSIÓN ANTI-CACHÉ -->
    <script src="js/data.js?v=10.3" defer></script>
    <script src="js/a11y.js?v=10.3" defer></script>
    <script src="js/user.js?v=10.3" defer></script>
    <script src="js/aura-ai.js?v=10.3" defer></script>
    <script src="js/oasis.js?v=10.3" defer></script>
    <script src="js/router.js?v=10.3" defer></script>
    <script src="js/core.js?v=10.3" defer></script>

</body>
</html>
