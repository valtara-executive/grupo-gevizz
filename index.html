    <!-- ESTILOS CSS (Cortar y pegar en css/main.css y css/components.css) -->

    <style>
        /* === INICIO MAIN.CSS (Sistema de Diseño Base) === */
        :root {
            /* Colorimetría: Revista de Lujo (No negro puro) */
            --bg-base: #07090e; /* Azul abisal muy oscuro */
            --bg-surface: #0f121a;
            
            /* Acentos definidos en arquitectura */
            --gold-imperial: #D4AF37;
            --green-quetzal: #006B3C;
            --rose-mexicano: #E05073;
            --cyan-ia: #00B8D4;
            --text-primary: #F0F2F5;
            --text-secondary: #A0A5B5;

            /* Glassmorphism avanzado (Cristal Esmerilado) */
            --glass-bg: rgba(15, 18, 26, 0.55);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            
            /* Tipografía */
            --font-headings: 'Cinzel', serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0, 184, 212, 0.03) 0%, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Tipografía Editorial */
        h1, h2, h3, h4 {
            font-family: var(--font-headings);
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--gold-imperial);
            margin-bottom: 1rem;
        }

        /* Bloqueo de scroll para modales e IA */
        body.scroll-locked {
            overflow: hidden;
        }
        /* === FIN MAIN.CSS === */

        /* === INICIO COMPONENTS.CSS (Grillas, Tarjetas, Botones) === */
        
        /* Layout Maestro */
        #app-container {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        /* Cascarones de Secciones (El Constructor JS inyecta aquí) */
        .view-section {
            display: none; /* Ocultas por defecto */
            width: 100%;
            padding: 4rem 2rem;
            animation: fadeIn 0.5s ease-in-out;
        }

        .view-section.active {
            display: block; /* Router.js cambia esta clase */
        }

        /* Pantalla Completa VIP (Aura y Expediente) */
        .view-section.fullscreen-mode.active {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background: var(--bg-base);
            padding: 2rem;
            overflow-y: auto;
            backdrop-filter: blur(20px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Grillas de Revista (Imágenes Perfectas) */
        .editorial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        /* Paneles Glassmorphism (Tarjetas) */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--glass-shadow);
            transition: transform 0.3s ease, border-color 0.3s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .glass-panel:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.3); /* Destello dorado sutil */
        }

        /* Contenedores de Fotos (Ajuste Perfecto) */
        .img-editorial {
            width: 100%;
            height: 250px;
            object-fit: cover; /* Ensambla la foto sin deformarla */
            border-radius: 8px;
            margin-bottom: 1.5rem;
            filter: brightness(0.9) contrast(1.1); /* Tono elegante */
        }

        /* Botones Lujosos y Accesibles */
        .btn-lujo {
            display: inline-block;
            padding: 12px 28px;
            font-family: var(--font-body);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
        }

        /* Colores Dinámicos de Botones (Regla: Contraste adecuado) */
        .btn-white {
            background: #ffffff;
            color: #000000;
        }
        .btn-red {
            background: var(--rose-mexicano);
            color: #ffffff;
        }
        .btn-dark {
            background: #111111;
            color: #ffffff;
            border: 1px solid #333;
        }
        .btn-gold {
            background: var(--gold-imperial);
            color: #000000;
        }
        .btn-cyan {
            background: var(--cyan-ia);
            color: #000000;
            box-shadow: 0 0 15px rgba(0, 184, 212, 0.4);
        }

        .btn-lujo:hover {
            filter: brightness(1.15);
            transform: scale(1.02);
        }

        /* Menú Lateral (Sidebar Inyectable) */
        #sidebar-shell {
            width: 280px;
            background: var(--bg-surface);
            border-right: 1px solid var(--glass-border);
            height: 100vh;
            position: sticky;
            top: 0;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .nav-item {
            color: var(--text-secondary);
            text-decoration: none;
            font-family: var(--font-headings);
            font-size: 1.1rem;
            padding: 10px 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--gold-imperial);
            background: rgba(212, 175, 55, 0.05);
        }

        /* Ítems VIP del Menú */
        .nav-item.vip-aura {
            color: var(--cyan-ia);
            border: 1px solid rgba(0, 184, 212, 0.2);
            margin-top: 2rem;
        }
        .nav-item.vip-expediente {
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.02);
        }

        /* Responsivo Editorial */
        @media (max-width: 900px) {
            #app-container { flex-direction: column; }
            #sidebar-shell { 
                width: 100%; 
                height: auto; 
                position: relative;
                flex-direction: row;
                flex-wrap: wrap;
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
            }
            .view-section { padding: 2rem 1rem; }
        }
        /* === FIN COMPONENTS.CSS === */
    </style>
</head>
