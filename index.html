<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>VALTARA | Executive Therapy</title>
    <meta name="theme-color" content="#070712">
    
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self'; 
        connect-src 'self' https://aura-server-erfj.vercel.app https://api.groq.com https://openrouter.ai https://generativelanguage.googleapis.com; 
        font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; 
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; 
        script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; 
        img-src 'self' data: blob: https://cdn-icons-png.flaticon.com;
    ">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/main.css?v=61.0.0">
    <link rel="stylesheet" href="css/components.css?v=61.0.0">

    <style>
        /* Aislamiento cuando Aura o Bóveda están activas */
        body:has(#view-aura.active) .system-header, body:has(#view-user-vault.active) .system-header,
        body:has(#view-aura.active) #smart-fabs, body:has(#view-user-vault.active) #smart-fabs { display: none !important; }
        body:has(#view-aura.active) .view-section, body:has(#view-user-vault.active) .view-section { padding-top: 1.5rem !important; }
    </style>
</head>

<body>
    <header class="system-header" id="system-header">
        <button class="header-logo" id="logo-btn" data-target="home" aria-label="Ir a Inicio">
            <img src="logo.png" alt="Valtara" class="logo-img" style="height:60px;">
        </button>
        <div class="header-controls">
            <button class="header-action-btn" onclick="document.getElementById('a11y-modal').showModal();" aria-label="Accesibilidad"><i class="fa-solid fa-universal-access"></i></button>
            <button class="hamburger-btn" id="menu-toggle-btn" aria-label="Menú"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>

    <nav class="side-menu" id="main-nav">
        <div class="menu-header">
            <div class="patient-profile-card">
                <div class="profile-avatar"><i class="fa-solid fa-spa"></i></div>
                <div class="profile-info">
                    <span class="profile-greeting">¡Hola!</span>
                    <strong class="profile-name" id="menu-user-name">Ejecutivo</strong>
                </div>
            </div>
            <button class="close-btn" id="menu-close-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="menu-scroll-area">
            <h3 class="menu-section-title">Espacios</h3>
            <ul class="nav-list bento-nav-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; list-style:none;">
                <li><button class="nav-item" data-target="home" style="width:100%; padding:2rem; background:#111; color:#fff; border:1px solid #333; border-radius:15px;"><i class="fa-solid fa-house" style="font-size:2rem; margin-bottom:10px;"></i><br>Santuario</button></li>
                <li><button class="nav-item" data-target="restoration" style="width:100%; padding:2rem; background:#111; color:#fff; border:1px solid #333; border-bottom:3px solid var(--v-verde-quetzal); border-radius:15px;"><i class="fa-solid fa-hands-holding-circle" style="font-size:2rem; margin-bottom:10px;"></i><br>Masoterapia</button></li>
                <li><button class="nav-item" data-target="beauty" style="width:100%; padding:2rem; background:#111; color:#fff; border:1px solid #333; border-bottom:3px solid var(--v-rosa-mexicano); border-radius:15px;"><i class="fa-solid fa-wand-magic-sparkles" style="font-size:2rem; margin-bottom:10px;"></i><br>Art & Nails</button></li>
                <li><button class="nav-item" data-target="sonotherapy" style="width:100%; padding:2rem; background:#111; color:#fff; border:1px solid #333; border-bottom:3px solid var(--v-azul-talavera); border-radius:15px;"><i class="fa-solid fa-water" style="font-size:2rem; margin-bottom:10px;"></i><br>Sonoterapia</button></li>
            </ul>
            <button class="btn-agenda-ahora" data-target="aura" style="width:100%; margin-top:2rem; padding:1.5rem; background:var(--v-amatista); color:#fff; border:none; border-radius:20px; cursor:pointer;"><i class="fa-solid fa-sparkles"></i> Aura AI</button>
        </div>
    </nav>

    <dialog id="a11y-modal">
        <div class="modal-content">
            <header class="modal-header"><h3>Inclusión</h3><button class="close-btn" onclick="document.getElementById('a11y-modal').close();"><i class="fa-solid fa-xmark"></i></button></header>
            <div class="modal-body"><p>Panel de neuro-inclusión en construcción.</p></div>
        </div>
    </dialog>

    <aside class="float-controls float-right" id="smart-fabs" style="position:fixed; bottom:3rem; right:3rem; display:flex; flex-direction:column; gap:1.5rem; z-index:1500;">
        <button class="fab-btn fab-aura" data-target="aura" style="width:4.5rem; height:4.5rem; border-radius:50%; background:var(--v-amatista); color:white; border:none; font-size:2rem; cursor:pointer; box-shadow:0 10px 20px rgba(178,0,255,0.4);"><i class="fa-solid fa-robot"></i></button>
        <a href="https://wa.me/5213348572070" target="_blank" class="fab-btn fab-ws" style="width:4.5rem; height:4.5rem; border-radius:50%; background:#25D366; color:white; border:none; font-size:2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; text-decoration:none; box-shadow:0 10px 20px rgba(37,211,102,0.4);"><i class="fa-brands fa-whatsapp"></i></a>
    </aside>

    <main id="main-content">
        <section id="view-home" class="view-section active"></section>
        <section id="view-restoration" class="view-section"></section>
        <section id="view-beauty" class="view-section"></section>
        <section id="view-sonotherapy" class="view-section"></section>
        <section id="view-science" class="view-section"></section>
        <section id="view-legal" class="view-section"></section>

        <section id="view-aura" class="view-section">
            <div style="padding:1.5rem; background:rgba(7,7,12,0.9); border-radius:20px; border-bottom:1px solid #00FFCC; margin-bottom:2rem; display:flex; gap:1rem; align-items:center;">
                <button data-target="home" style="background:transparent; border:1px solid #00FFCC; color:#00FFCC; width:50px; height:50px; border-radius:50%; cursor:pointer; font-size:1.5rem;"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 style="color:#fff; font-family:var(--font-accent); font-size:2.5rem; margin:0;"><i class="fa-solid fa-sparkles" style="color:#00FFCC;"></i> Aura AI</h2>
            </div>
            <div style="height:60vh; background:rgba(10,10,15,0.8); border-radius:20px; border:1px solid rgba(0,255,204,0.3); padding:2rem; overflow-y:auto; display:flex; flex-direction:column; gap:1rem;" id="aura-chat">
                <div style="text-align:center; padding:3rem;"><i class="fa-solid fa-brain" style="font-size:5rem; color:rgba(255,255,255,0.1);"></i><br><br><span style="color:#666; font-family:monospace;">INICIANDO CONEXIÓN NEURONAL...</span></div>
            </div>
            <div style="margin-top:1rem; display:flex; gap:1rem; background:rgba(5,5,10,0.9); padding:1rem; border-radius:30px; border:1px solid rgba(255,255,255,0.1);">
                <input type="text" id="aura-input" placeholder="Escribe tu consulta..." style="flex:1; background:transparent; border:none; color:#fff; font-size:1.2rem; padding:0 1rem; outline:none;">
                <button id="aura-send-btn" style="width:4rem; height:4rem; border-radius:50%; background:var(--valtara-oro-brillante); border:none; cursor:pointer; font-size:1.5rem;"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </section>

        <section id="view-user-vault" class="view-section"></section>
    </main>

    <footer id="main-footer"></footer>

    <script src="js/inicio_bienvenida.js?v=61.0.0" defer></script>
    <script src="js/inicio_promociones.js?v=61.0.0" defer></script>
    <script src="js/inicio_mapa_cuerpo.js?v=61.0.0" defer></script>
    <script src="js/catalogo_masajes.js?v=61.0.0" defer></script>
    <script src="js/catalogo_belleza.js?v=61.0.0" defer></script>
    <script src="js/sonoterapia_introduccion.js?v=61.0.0" defer></script>
    <script src="js/ciencia_introduccion.js?v=61.0.0" defer></script>
    
    <script src="js/constructor_maestro.js?v=61.0.0" defer></script>
    <script src="js/router.js?v=61.0.0" defer></script>
    <script src="js/core.js?v=61.0.0" defer></script>
    <script src="js/aura.js?v=61.0.0" defer></script>
</body>
</html>
